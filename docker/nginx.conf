# docker/nginx.conf
# =============================================================================
# NGINX CONFIGURATION FOR TELCO CHURN API
# Serves frontend static files + proxies API requests to Gunicorn
# Designed for Docker/Container deployment (daemon managed by Docker)
# =============================================================================

worker_processes auto;
# ✅ REMOVED: daemon off; (Docker manages process, nginx inherits)
error_log /app/tmp/nginx_error.log warn;
pid /app/tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Access log to writable location
    access_log /app/tmp/nginx_access.log;
    
    sendfile on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    server {
        listen 80;
        server_name localhost;

        # Serve frontend static files
        location / {
            root /app/frontend;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to FastAPI backend
        location /api/ {
            proxy_pass http://127.0.0.1:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeout settings
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # CORS headers (if needed)
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
            add_header Access-Control-Allow-Headers 'Content-Type,Authorization';
            
            # Handle preflight requests
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
                add_header Access-Control-Allow-Headers 'Content-Type,Authorization';
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }
        }

        # Health check endpoint (passthrough to backend)
        location /health {
            proxy_pass http://127.0.0.1:8000/health;
            proxy_set_header Host $host;
        }

        # Model info endpoint
        location /model/info {
            proxy_pass http://127.0.0.1:8000/model/info;
            proxy_set_header Host $host;
        }

        # Metrics endpoint for Prometheus
        location /metrics {
            proxy_pass http://127.0.0.1:8000/metrics;
            proxy_set_header Host $host;
        }
    }
}