# .github/workflows/deploy.yml
name: Build & Push to Huawei SWR

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'artifacts/**'
      - 'docker/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # Allow manual trigger

env:
  REGISTRY: swr.ap-southeast-1.myhuaweicloud.com
  ORG: telco-churn
  APP: telco-churn-app
  REGION: ap-southeast-1

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Validate Artifacts
  # ---------------------------------------------------------------------------
  validate:
    name: Validate Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn xgboost joblib
      
      - name: Validate required artifacts
        run: |
          echo "🔍 Checking required files..."
          
          if [ ! -f "artifacts/model.pkl" ]; then
            echo "❌ ERROR: artifacts/model.pkl not found!"
            exit 1
          fi
          if [ ! -f "artifacts/preprocessing_pipeline.joblib" ]; then
            echo "❌ ERROR: artifacts/preprocessing_pipeline.joblib not found!"
            exit 1
          fi
          if [ ! -f "artifacts/serving_config.json" ]; then
            echo "❌ ERROR: artifacts/serving_config.json not found!"
            exit 1
          fi
          if [ ! -f "docker/Dockerfile" ]; then
            echo "❌ ERROR: docker/Dockerfile not found!"
            exit 1
          fi
          if [ ! -f "requirements.txt" ]; then
            echo "❌ ERROR: requirements.txt not found!"
            exit 1
          fi
          
          echo "✅ All required files present!"
          echo "📦 Model size: $(du -h artifacts/model.pkl | cut -f1)"

  # ---------------------------------------------------------------------------
  # Job 2: Build & Push Docker Image (FIXED - Classic Docker)
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push to Huawei SWR
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ FIX: Use Docker directly (no buildx)
      - name: Set up Docker
        run: |
          sudo apt-get update
          sudo apt-get install -y docker.io

      - name: Login to Huawei SWR
        run: |
          echo "${{ secrets.HUAWEI_SWR_PASSWORD }}" | \
          docker login ${{ env.REGISTRY }} -u "${{ secrets.HUAWEI_SWR_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.APP }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.APP }}:sha-${{ github.sha }} \
            -f docker/Dockerfile \
            --platform linux/amd64 \
            .

      - name: Push to Huawei SWR
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.APP }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.APP }}:sha-${{ github.sha }}
          echo "✅ Push complete"

      - name: Image pushed successfully
        run: |
          echo "✅ Docker image built and pushed successfully!"
          echo "📦 Image: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.APP }}:latest"
          echo "🔗 SWR Console: https://console.huaweicloud.com/swr/"

  # ---------------------------------------------------------------------------
  # Job 3: Deployment Summary
  # ---------------------------------------------------------------------------
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Display deployment info
        run: |
          echo "🎉 BUILD COMPLETE!"
          echo "============================================================"
          echo "📦 Docker Image:"
          echo "   ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.APP }}:latest"
          echo ""
          echo "🔗 Huawei SWR Console:"
          echo "   https://console.huaweicloud.com/swr/?region=${{ env.REGION }}"
          echo ""
          echo "📋 Next Steps for Manual CCE Deployment:"
          echo "   1. Login to Huawei Cloud Console"
          echo "   2. Go to CCE → Your cluster → Workloads"
          echo "   3. Create/Update Deployment with image:"
          echo "      ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.APP }}:latest"
          echo "   4. Apply Kubernetes manifests from k8s/ folder"
          echo ""
          echo "⚠️  Create SWR pull secret in CCE first:"
          echo "   kubectl create secret docker-registry swr-secret \\"
          echo "     --docker-server=${{ env.REGISTRY }} \\"
          echo "     --docker-username=<your-swr-username> \\"
          echo "     --docker-password=<your-swr-password> \\"
          echo "     -n telco-churn"
          echo "============================================================"