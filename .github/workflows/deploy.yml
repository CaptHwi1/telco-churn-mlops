# .github/workflows/deploy.yml
name: Build & Push to Huawei SWR

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'artifacts/**'
      - 'docker/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # Allow manual trigger

env:
  REGISTRY: swr.ap-southeast-1.myhuaweicloud.com
  ORG: telco-churn
  APP: telco-churn-app
  REGION: ap-southeast-1

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Validate Artifacts
  # ---------------------------------------------------------------------------
  validate:
    name: Validate Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn xgboost joblib
      
      - name: Validate required artifacts
        run: |
          echo "🔍 Checking required files..."
          
          # Check model files
          if [ ! -f "artifacts/model.pkl" ]; then
            echo "❌ ERROR: artifacts/model.pkl not found!"
            echo "   Please run baseline_model.ipynb or hyperparameter_tuning.ipynb first"
            exit 1
          fi
          
          if [ ! -f "artifacts/preprocessing_pipeline.joblib" ]; then
            echo "❌ ERROR: artifacts/preprocessing_pipeline.joblib not found!"
            exit 1
          fi
          
          if [ ! -f "artifacts/serving_config.json" ]; then
            echo "❌ ERROR: artifacts/serving_config.json not found!"
            exit 1
          fi
          
          # Check Dockerfile
          if [ ! -f "docker/Dockerfile" ]; then
            echo "❌ ERROR: docker/Dockerfile not found!"
            exit 1
          fi
          
          # Check requirements
          if [ ! -f "requirements.txt" ]; then
            echo "❌ ERROR: requirements.txt not found!"
            exit 1
          fi
          
          echo "✅ All required files present!"
          echo "📦 Model size: $(du -h artifacts/model.pkl | cut -f1)"
          echo "📦 Preprocessing size: $(du -h artifacts/preprocessing_pipeline.joblib | cut -f1)"

  # ---------------------------------------------------------------------------
  # Job 2: Build & Push Docker Image
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push to Huawei SWR
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Huawei SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HUAWEI_SWR_USERNAME }}
          password: ${{ secrets.HUAWEI_SWR_PASSWORD }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.APP }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=v1.0.0,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}
      
      - name: Image built successfully
        run: |
          echo "✅ Docker image built and pushed successfully!"
          echo "📦 Image: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.APP }}:${{ steps.meta.outputs.version }}"
          echo "🔗 SWR Console: https://console.huaweicloud.com/swr/"
          echo ""
          echo "📋 Image Tags:"
          echo "   - ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.APP }}:latest"
          echo "   - ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.APP }}:sha-${{ github.sha }}"
          echo "   - ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.APP }}:v1.0.0"

  # ---------------------------------------------------------------------------
  # Job 3: Deployment Summary (Optional - Manual CCE Deploy)
  # ---------------------------------------------------------------------------
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Display deployment info
        run: |
          echo "🎉 BUILD COMPLETE!"
          echo "============================================================"
          echo ""
          echo "📦 Docker Image:"
          echo "   ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.APP }}:latest"
          echo ""
          echo "🔗 Huawei SWR Console:"
          echo "   https://console.huaweicloud.com/swr/?region=${{ env.REGION }}"
          echo ""
          echo "📋 Next Steps for Manual CCE Deployment:"
          echo "   1. Login to Huawei Cloud Console"
          echo "   2. Go to CCE (Cloud Container Engine)"
          echo "   3. Select your cluster"
          echo "   4. Create/Update Deployment with image:"
          echo "      ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.APP }}:latest"
          echo "   5. Apply Kubernetes manifests from k8s/ folder"
          echo ""
          echo "⚠️  Remember to create SWR pull secret in CCE:"
          echo "   kubectl create secret docker-registry swr-secret \\"
          echo "     --docker-server=${{ env.REGISTRY }} \\"
          echo "     --docker-username=<your-swr-username> \\"
          echo "     --docker-password=<your-swr-password> \\"
          echo "     -n telco-churn"
          echo "============================================================"