# .github/workflows/deploy.yml
name: Build & Push to Huawei SWR

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'artifacts/**'
      - 'docker/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  REGISTRY: swr.ap-southeast-1.myhuaweicloud.com
  ORG: telco-churn-test
  APP: telco-churn-app
  REGION: ap-southeast-1

jobs:
  validate:
    name: Validate Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn xgboost joblib
      - name: Validate required artifacts
        run: |
          echo "🔍 Checking required files..."
          test -f artifacts/model.pkl || { echo "❌ model.pkl missing"; exit 1; }
          test -f artifacts/preprocessing_pipeline.joblib || { echo "❌ preprocessing missing"; exit 1; }
          test -f artifacts/serving_config.json || { echo "❌ serving_config.json missing"; exit 1; }
          test -f docker/Dockerfile || { echo "❌ Dockerfile missing"; exit 1; }
          test -f requirements.txt || { echo "❌ requirements.txt missing"; exit 1; }
          echo "✅ All required files present!"

  build-and-push:
    name: Build & Push to Huawei SWR
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      #  Use pre-installed Docker
      - name: Verify Docker
        run: docker --version

      - name: Login to Huawei SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HUAWEI_SWR_USERNAME }}
          password: ${{ secrets.HUAWEI_SWR_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.APP }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
            type=raw,value=v1.1.0

      # ✅ Classic docker build
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.APP }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.APP }}:sha-${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.APP }}:v1.1.0 \
            -f docker/Dockerfile \
            --platform linux/amd64 \
            .

      # ✅ Classic docker push
      - name: Push to Huawei SWR
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.APP }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.APP }}:sha-${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.APP }}:v1.1.0

      - name: Success
        run: echo "✅ Image pushed to SWR"

  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Display info
        run: |
          echo "🎉 BUILD COMPLETE!"
          echo "📦 Image: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.APP }}:latest"
          echo "🔗 SWR: https://console.huaweicloud.com/swr/?region=${{ env.REGION }}"